# =============================================================================
# 采集服务默认配置 — 复制为 default.yaml 后修改
# =============================================================================

串口: COM10
采样率: 250
通道数: 8

滤波:
  启用: true
  带通低频_hz: 0.5
  带通高频_hz: 45.0
  陷波低频_hz: 49.0
  陷波高频_hz: 51.0

lsl:
  eeg流名称: OpenBCI_EEG
  加速度流名称: OpenBCI_Accel
  # 顺序 = CH1…CH8；若实际接线不同，请按「第几列数据」改名称
  eeg通道标签:
    - C3
    - C4
    - CZ
    - CP3
    - CP4
    - CPZ
    - FC3
    - FC4

# OpenBCI GUI 7 STREAMING 旁路（可选，见 docs/项目框架-数据缓存与LSL协议.md §5）
gui推流:
  启用: false
  ip: 225.1.1.1
  端口: 6677

录制:
  启用: false                    # true = 开始采集时自动开始 CSV 录制
  保存目录: data/recordings
  文件前缀: eeg
  包含加速度: false
  停止采集时自动停录: true
  flush间隔秒: 2.0
