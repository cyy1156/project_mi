# =============================================================================
# 模型登记表 — 复制本文件为 models.yaml 后修改
# 操作员在控制面板使用:  model list  /  model start <顶层键名>
# =============================================================================
#
# 填表说明:
#   - 顶层键名(如 demo、睡眠检测): 操作员输入的名字，区分大小写
#   - 窗口采样点数: 250 = 约 1 秒 @ 250Hz
#   - 步长采样点数: 每次推进多少点，常用为窗口的一半
#   - 模块: Python 包路径，对应 models/ 目录下的文件
#   - 类名 与 入口: 二选一。类插件填类名；函数插件填入口(如 predict)
#   - 权重文件: 可选，.pt / .onnx 等路径
#
# 注意: 缩进用 2 个空格; 冒号后要有空格; 不要用 Tab

demo:
  说明: 内置演示，打印均值方差，无需权重文件
  窗口采样点数: 250
  步长采样点数: 125
  模块: models.demo_stats
  类名: DemoStatsModel

# --- 以下为示例：需程序员提供对应 .py 文件后才能使用 ---

睡眠检测:
  说明: 示例 — 睡眠分期模型（需 models/sleep_model.py）
  窗口采样点数: 250
  步长采样点数: 125
  模块: models.sleep_model
  类名: SleepModel
  权重文件: checkpoints/sleep.pt

运动想象:
  说明: 示例 — 运动想象 2 秒窗口
  窗口采样点数: 500
  步长采样点数: 250
  模块: models.mi_model
  入口: predict
  权重文件: checkpoints/mi.onnx
  输入格式: channels_samples
