# =============================================================================
# 采集服务默认配置 — 可由控制台 UI「保存配置」更新
# 本机可用串口探测结果: COM3 / COM4（旧机 COM10 已失效）
# =============================================================================

串口: COM3
使用合成板: true          # true：无硬件可跑通 UI/录制；接上 Cyton 后改为 false
采样率: 250
通道数: 8

滤波:
  启用: true
  带通低频_hz: 0.5
  带通高频_hz: 45.0
  陷波低频_hz: 49.0
  陷波高频_hz: 51.0

采集:
  单批上限: 25
  后台安静: true

lsl:
  eeg流名称: OpenBCI_EEG
  加速度流名称: OpenBCI_Accel
  # 顺序 = CH1…CH8 数据列（与 CSV 表头一致）
  eeg通道标签:
    - C3
    - C4
    - CZ
    - CP3
    - CP4
    - CPZ
    - FC3
    - FC4

gui推流:
  启用: false
  ip: 225.1.1.1
  端口: 6677

录制:
  # false：按 SOP 由操作员在 Cue/Imagine 前手动开始录制
  启用: false
  保存目录: data/recordings
  文件前缀: eeg
  包含加速度: false
  停止采集时自动停录: true
  flush间隔秒: 2.0
  lsl缓冲秒: 300
